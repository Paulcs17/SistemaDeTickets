{% extends 'base.html' %}
{% block title %}Tickets | MuniDesk{% endblock %}
{% block content %}
<div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
  <div><div class="section-kicker">Gestión</div><h1 class="h2 fw-bold mb-1">Tickets</h1><p class="text-secondary mb-0">Vista general de tickets según tu rol.</p></div>
  {% if current_user.role == 'solicitante' %}<a href="{{ url_for('tickets.create_ticket') }}" class="btn btn-primary rounded-pill px-4">Nuevo ticket</a>{% endif %}
</div>
<div class="card modern-card"><div class="card-body p-4">{% include 'tickets/_table.html' %}</div></div>
{% endblock %}
